version: "3.8"

# Single service running both collector + API server.
# Usage: docker compose up -d

services:
  cloudseeding:
    build: .
    command: node start.js
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/cloudseeding.db
      - PORT=4000
      - COLLECT_INTERVAL_MS=300000
      # Recommended: raise OpenSky limits (fixes 429s). Set in a .env file.
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID:-}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET:-}
      # Observation source for anomaly detection: openmeteo (default) | mrms | goes
      - OBSERVATION_SOURCE=${OBSERVATION_SOURCE:-openmeteo}
      # - OBSERVATION_SIDECAR_URL=${OBSERVATION_SIDECAR_URL:-}
    restart: unless-stopped

volumes:
  db-data:
