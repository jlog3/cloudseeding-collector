version: "3.8"

# Run both the collector and the API server sharing one database file.
# Usage: docker compose up -d

services:
  collector:
    build: .
    command: node collect-loop.js
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/cloudseeding.db
      - COLLECT_INTERVAL_MS=300000
    restart: unless-stopped

  api:
    build: .
    command: node serve.js
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/cloudseeding.db
      - PORT=4000
    restart: unless-stopped
    depends_on:
      - collector

volumes:
  db-data:
