version: "3.8"

# Single service running both collector + API server.
# Usage: docker compose up -d

services:
  cloudseeding:
    build: .
    command: node start.js
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/cloudseeding.db
      - PORT=4000
      - COLLECT_INTERVAL_MS=300000
    restart: unless-stopped

volumes:
  db-data:
